<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cheyxtion Property</title>
    <link rel="icon" type="image/png" href="..">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-light shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold text-dark" href="#">Chey<span class="text-primary-custom">Kurs</span></a>
            <div class="ms-auto">
                <a href="https://discord.gg/d6jpzYsjcq" target="_blank" class="btn btn-discord d-flex align-items-center">
                    <i class="fab fa-discord me-2"></i> Discord
                </a>
            </div>
        </div>
    </nav>

    <main class="container-fluid py-5">
        <div class="row justify-content-center align-items-center min-vh-75 py-2">
            <div class="col-md-8 col-lg-5 col-xl-4 col-xxl-3">
                <div class="card converter-card">
                    <div class="text-center mb-4">
                        <h2 class="fw-bold h4 mb-1">Konverter CT</h2>
                        <p class="text-muted small">Presisi tinggi untuk nilai tukar pasar.</p>
                    </div>

                    <div class="mb-3">
                        <label class="label-text">Jumlah CT</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white">CT</span>
                            <input type="text" id="ct-input" class="form-control" placeholder="0,00" value="3.289,00">
                        </div>
                    </div>

                    <div class="text-center arrow-icon my-2">
                        <i class="fas fa-arrow-down fa-lg"></i>
                    </div>

                    <div class="mb-3">
                        <label class="label-text">Estimasi Rupiah (IDR)</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white">Rp</span>
                            <input type="text" id="idr-input" class="form-control" placeholder="0,00" value="1.000,00">
                        </div>
                    </div>

                    <div class="alert-custom d-flex align-items-center mt-3">
                        <div class="info-icon"><i class="fas fa-info"></i></div>
                        <div class="info-text">
                            <strong>3.289 CT = Rp 1.000,00</strong>
                            <p>*Patokan kurs tetap pasar hari ini.</p>
                        </div>
                    </div>
                </div> </div> </div> </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
