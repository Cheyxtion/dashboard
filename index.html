<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cheyxtion Property</title>
    <link rel="icon" type="image/png" href="images/currency-exchange.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold text-dark" href="#">
                Chey<span class="text-primary-custom">Kurs</span>
            </a>
            <div class="ms-auto d-flex align-items-center">
                <a class="nav-link me-3 d-none d-sm-block" href="#">Home</a>
                <a class="nav-link me-3 d-none d-sm-block" href="help.html">Help</a>
                <a href="https://discord.gg/d6jpzYsjcq" target="_blank" class="btn btn-discord btn-sm">
                    <i class="fab fa-discord me-1"></i> Discord
                </a>
            </div>
        </div>
    </nav>

    <main class="flex-grow-1 d-flex align-items-center justify-content-center p-3">
        <div class="card converter-card shadow-lg border-0">
            <div class="text-center mb-4">
                <h2 class="fw-bold h4 mb-1">Konverter CT</h2>
                <p class="text-muted small">Presisi tinggi untuk nilai tukar pasar.</p>
            </div>

            <div class="mb-3">
                <label class="label-text">Jumlah CT</label>
                <div class="input-group input-group-lg">
                    <span class="input-group-text bg-white border-end-0">CT</span>
                    <input type="text" id="ct-input" class="form-control border-start-0 ps-1" value="3.289,00">
                </div>
            </div>

            <div class="text-center my-2 text-muted"><i class="fas fa-arrow-down"></i></div>

            <div class="mb-4">
                <label class="label-text">Estimasi Rupiah (IDR)</label>
                <div class="input-group input-group-lg">
                    <span class="input-group-text bg-white border-end-0">Rp</span>
                    <input type="text" id="idr-input" class="form-control border-start-0 ps-1" value="1.000,00">
                </div>
            </div>

            <div class="alert-custom d-flex align-items-center">
                <div class="info-icon"><i class="fas fa-info"></i></div>
                <div class="info-text">
                    <strong>3.289 CT = Rp 1.000,00</strong>
                    <p style="font-size: 10px;">*Patokan kurs tetap pasar hari ini.</p>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer-compact bg-dark text-white py-3">
        <div class="container d-flex flex-column flex-md-row justify-content-between align-items-center">
            <p class="mb-0 small opacity-75">&copy; 2026 Cheyxtion Team.</p>
            <div class="footer-links-small my-2 my-md-0">
                <a href="index.html" class="text-white-50 text-decoration-none mx-2 small">Home</a>
                <a href="help.html" class="text-white-50 text-decoration-none mx-2 small">Help</a>
            </div>
            <div class="social-small">
                <a href="#" class="text-white mx-2"><i class="fab fa-instagram"></i></a>
                <a href="https://discord.gg/d6jpzYsjcq" class="text-white mx-2"><i class="fab fa-discord"></i></a>
            </div>
        </div>
    </footer>

</body>
</html>
