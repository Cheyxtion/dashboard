<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kurs CT ke IDR | CheyKurs</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bs-primary: #5865F2; }
        .btn-primary { background-color: var(--bs-primary); border: none; }
        .text-primary { color: var(--bs-primary) !important; }
        .min-vh-75 { min-height: 75vh; }
        input::placeholder { font-size: 0.9rem; opacity: 0.5; }
    </style>
</head>
<body class="bg-light">

    <nav class="navbar navbar-white bg-white shadow-sm sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold text-dark" href="#">Chey<span class="text-primary">Kurs</span></a>
            <a href="https://discord.gg/link-kamu" target="_blank" class="btn btn-primary btn-sm px-3">
                <i class="fab fa-discord me-1"></i> Discord
            </a>
        </div>
    </nav>

    <main class="container my-5">
        <div class="row justify-content-center align-items-center min-vh-75 py-2">
            <div class="col-md-8 col-lg-5">
                <div class="card shadow border-0 p-4 rounded-4 bg-white">
                    <div class="text-center mb-4">
                        <h1 class="fw-bold h4 mb-1">Konverter CT</h1>
                        <p class="text-muted small">Presisi Format: 1.000,00</p>
                    </div>

                    <div class="mb-3">
                        <label class="form-label small fw-bold text-secondary">Jumlah CT</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white text-muted">CT</span>
                            <input type="text" id="ct-input" class="form-control form-control-lg" placeholder="Masukkan angka...">
                        </div>
                    </div>

                    <div class="text-center my-2 text-muted"><i class="fas fa-arrow-down"></i></div>

                    <div class="mb-4">
                        <label class="form-label small fw-bold text-secondary">Estimasi Rupiah (IDR)</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white text-muted">Rp</span>
                            <input type="text" id="idr-input" class="form-control form-control-lg" placeholder="Hasil...">
                        </div>
                    </div>

                    <div class="alert alert-info border-0 rounded-3 p-3 mb-0">
                        <div class="d-flex align-items-center">
                            <i class="fas fa-info-circle me-3 text-info"></i>
                            <p class="mb-0 small text-info-emphasis">
                                <strong>3.289 CT = Rp 1.000,00</strong><br>
                                <span class="opacity-75" style="font-size: 10px;">*Patokan kurs tetap pasar hari ini.</span>
                            </p>
                        </div>
                    </div>
                </div> 
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const ctInput = document.getElementById('ct-input');
            const idrInput = document.getElementById('idr-input');
            const CT_BASE = 3289;
            const IDR_BASE = 1000;

            function formatIndo(angka) {
                return angka.toLocaleString('id-ID', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            }

            function cleanInput(val) {
                return parseFloat(val.replace(/\./g, '').replace(',', '.'));
            }

            ctInput.addEventListener('input', () => {
                const ctValue = cleanInput(ctInput.value);
                if (isNaN(ctValue)) { idrInput.value = ''; return; }
                idrInput.value = formatIndo((ctValue / CT_BASE) * IDR_BASE);
            });

            idrInput.addEventListener('input', () => {
                const idrValue = cleanInput(idrInput.value);
                if (isNaN(idrValue)) { ctInput.value = ''; return; }
                ctInput.value = formatIndo((idrValue / IDR_BASE) * CT_BASE);
            });

            // Set awal: 1 CT
            ctInput.value = "1,00";
            idrInput.value = formatIndo(1000 / 3289);
        });
    </script>
</body>
</html>
