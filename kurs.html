<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kurs CT to IDR | Cheyxtion`</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* --- LAYOUT FIX (Anti-Scroll & Footer Visible) --- */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden; /* Benar-benar mematikan scroll */
        }

        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background-color: #ffffff;
        }

        /* Navbar tetap ukurannya */
        .navbar {
            flex-shrink: 0;
            z-index: 10;
            background: white !important;
        }

        /* Main dibuat elastis untuk mendorong footer ke bawah */
        main {
            flex: 1 0 auto; /* Rahasia agar footer tetap di bawah */
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: linear-gradient(rgba(255, 255, 255, 0.9), rgba(255, 255, 255, 0.9)), 
                        url('/images/3d-white-wave-texture-background-concept-free-vector.jpg'); 
            background-size: cover;
            background-position: center;
            padding: 20px;
        }

        /* --- COMING SOON CARD --- */
        .coming-soon-card {
            background: white;
            padding: 30px;
            border-radius: 25px;
            border: 1px solid rgba(0,0,0,0.05);
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            text-align: center;
            max-width: 480px;
            width: 95%;
            z-index: 2;
        }

        .icon-box {
            width: 60px;
            height: 60px;
            background: var(--primary-gradient);
            color: white;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin: 0 auto 15px;
            animation: pulse-blue 2s infinite;
        }

        @keyframes pulse-blue {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(88, 101, 242, 0.4); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(88, 101, 242, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(88, 101, 242, 0); }
        }

        .progress {
            height: 6px;
            border-radius: 10px;
            background-color: #f2f3f5;
            margin-top: 20px;
        }

        /* --- FOOTER FIX --- */
        footer {
            flex-shrink: 0; /* Footer dilarang mengecil/hilang */
            background-color: #0f1113 !important;
            padding: 15px 0 !important;
            width: 100%;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-light shadow-sm py-2">
        <div class="container">
            <a class="navbar-brand fw-bold fs-4" href="index.html">Chey<span style="color: #616DF3;">Kurs</span></a>
            <div class="ms-auto">
                <a href="index.html" class="btn btn-outline-dark rounded-pill px-4 fw-bold btn-sm">Kembali ke Home</a>
            </div>
        </div>
    </nav>

    <main>
        <div class="coming-soon-card">
            <div class="icon-box">
                <i class="fas fa-coins"></i>
            </div>
            <h2 class="fw-800 mb-2" style="font-size: 1.5rem;">Kurs CT <i class="fas fa-arrow-right mx-1 text-muted" style="font-size: 1rem;"></i> IDR</h2>
            <p class="text-muted mb-4 small">Fitur kalkulator konversi saldo Cheyxtion Token (CXT) ke Rupiah (IDR) sedang dalam tahap pengembangan.</p>
            
            <div class="badge bg-soft-primary px-3 py-2 rounded-pill mb-2" style="font-size: 0.7rem;">
                <i class="fas fa-tools me-1"></i> Under Construction
            </div>

            <div class="progress">
                <div class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar" style="width: 25%; background-color: var(--discord-color);"></div>
            </div>
            <p class="text-secondary mt-2 mb-0" style="font-size: 0.65rem;">Development Progress: 25%</p>
        </div>
    </main>

    <footer class="text-white text-center">
        <div class="container">
            <div class="footer-brand" style="font-size: 1rem; font-weight: 800;">Cheyxtion`</div>
            <p class="mb-0 opacity-50 small" style="font-size: 0.65rem;">Official Exchange Documentation &copy; 2026</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
